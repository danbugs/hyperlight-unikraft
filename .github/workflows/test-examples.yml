name: Test examples (regression gate)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - 'runtimes/**'
      - 'host/**'
      - '.github/workflows/test-examples.yml'

# Build-only regression gate — each example is built from scratch
# (rootfs + kernel) in its own job. We do NOT execute the guests
# because GitHub-hosted Linux runners don't expose /dev/kvm; hyperlight
# aborts with "No hypervisor was found" before any guest code runs.
#
# Catches exactly the kinds of regressions that hit us this session:
# missing CONFIG_* guards on renamed kernel branches, NuGet version
# drift, Dockerfile dependency issues. Doesn't catch pure runtime
# crashes (e.g. the powershell mmap bug) — those need a self-hosted
# runner with KVM, which we can add as a second job class later.

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build-example:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        example:
          - helloworld-c
          - rust
          - go
          - shell
          - python
          - python-tools
          - nodejs
          - dotnet
          - dotnet-nativeaot
          - hostfs-posix-c
          - hostfs-posix-py
          - multifn-c
          - python-agent
          - python-agent-driver
          # powershell intentionally omitted: fresh builds currently crash at
          # runtime with a deterministic kernel-mode SIGSEGV at 0x81ec7cd08
          # during pwsh startup (pre-existing bug in the mmap hot-path
          # overhaul, tracked separately). Build still passes — re-add once
          # the runtime crash is fixed.
    steps:
      - uses: actions/checkout@v4

      - name: Install Go (for kraft-hyperlight)
        run: |
          curl -sL https://go.dev/dl/go1.25.1.linux-amd64.tar.gz | sudo tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Build kraft-hyperlight
        run: |
          git clone --branch hyperlight-platform --depth 1 \
              https://github.com/danbugs/kraftkit.git /tmp/kraftkit
          cd /tmp/kraftkit && go build -o kraft-hyperlight ./cmd/kraft
          sudo mv kraft-hyperlight /usr/local/bin/

      - name: Build local-python-base images (python-agent-driver only)
        if: matrix.example == 'python-agent-driver'
        env:
          DOCKER_BUILDKIT: '0'
        run: |
          docker build --target base -t local-python-base-dev:latest \
              -f runtimes/python.Dockerfile runtimes/
          docker build -t local-python-base:latest \
              -f runtimes/python.Dockerfile runtimes/

      - name: Build rootfs
        working-directory: examples/${{ matrix.example }}
        env:
          DOCKER_BUILDKIT: '0'
        run: |
          just rootfs

      - name: Build kernel
        working-directory: examples/${{ matrix.example }}
        run: |
          kraft-hyperlight --no-prompt build --plat hyperlight --arch x86_64

      - name: Verify artifacts produced
        working-directory: examples/${{ matrix.example }}
        run: |
          kernel=$(ls .unikraft/build/*_hyperlight-x86_64 2>/dev/null | head -1)
          cpio=$(ls *-initrd.cpio initrd.cpio 2>/dev/null | head -1)
          if [ -z "$kernel" ] || [ ! -f "$kernel" ]; then
            echo "FAIL: no kernel artifact under .unikraft/build/"
            ls -la .unikraft/build/ 2>/dev/null || echo "  (no .unikraft/build dir)"
            exit 1
          fi
          if [ -z "$cpio" ] || [ ! -f "$cpio" ]; then
            echo "FAIL: no CPIO rootfs produced"
            ls -la *.cpio 2>/dev/null || echo "  (no .cpio files)"
            exit 1
          fi
          echo "PASS: kernel=$(stat -c '%s' $kernel) bytes, cpio=$(stat -c '%s' $cpio) bytes"

  # Optional: runtime smoke test when the runner actually exposes /dev/kvm.
  # GitHub Actions' standard ubuntu-latest runners have been inconsistently
  # shipping nested virtualization as of 2026; the udev rule below is a
  # no-op when the device node doesn't exist. If KVM turns out to be
  # present, we run a tiny subset of examples end-to-end to catch runtime
  # regressions that build-only jobs can't (e.g. the powershell mmap
  # crash). If not, the job exits 0 with a warning and doesn't gate the
  # workflow.
  runtime-smoke:
    runs-on: ubuntu-latest
    needs: build-example
    permissions:
      contents: read
      packages: read
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        example:
          - helloworld-c       # minimal ELF, confirms dispatch works
          - python-agent       # real workload — catches mmap/paging regressions
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM permissions (no-op if device absent)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true

      - name: Check KVM availability
        id: kvm_check
        run: |
          if [ -c /dev/kvm ] && [ -r /dev/kvm ] && [ -w /dev/kvm ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            ls -la /dev/kvm
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::/dev/kvm is not available on this runner; runtime smoke test skipped"
          fi

      - name: Install Go (for kraft-hyperlight)
        if: steps.kvm_check.outputs.available == 'true'
        run: |
          curl -sL https://go.dev/dl/go1.25.1.linux-amd64.tar.gz | sudo tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Install just
        if: steps.kvm_check.outputs.available == 'true'
        uses: extractions/setup-just@v2

      - name: Build kraft-hyperlight
        if: steps.kvm_check.outputs.available == 'true'
        run: |
          git clone --branch hyperlight-platform --depth 1 \
              https://github.com/danbugs/kraftkit.git /tmp/kraftkit
          cd /tmp/kraftkit && go build -o kraft-hyperlight ./cmd/kraft
          sudo mv kraft-hyperlight /usr/local/bin/

      - name: Build host CLI
        if: steps.kvm_check.outputs.available == 'true'
        run: |
          cd host && cargo build --release --bin hyperlight-unikraft
          sudo cp target/release/hyperlight-unikraft /usr/local/bin/

      - name: Build rootfs + kernel
        if: steps.kvm_check.outputs.available == 'true'
        working-directory: examples/${{ matrix.example }}
        env:
          DOCKER_BUILDKIT: '0'
        run: |
          just rootfs
          kraft-hyperlight --no-prompt build --plat hyperlight --arch x86_64

      - name: Run smoke
        if: steps.kvm_check.outputs.available == 'true'
        working-directory: examples/${{ matrix.example }}
        run: |
          kernel=$(ls .unikraft/build/*_hyperlight-x86_64 | head -1)
          cpio=$(ls *-initrd.cpio initrd.cpio 2>/dev/null | head -1)
          case "${{ matrix.example }}" in
            helloworld-c)
              expect="Hello from C on Hyperlight"
              args=""
              mem="4Mi"
              ;;
            python-agent)
              expect="done\."
              args="-- /agent.py"
              mem="1Gi"
              ;;
          esac
          output=$(timeout 60 hyperlight-unikraft -q -m "$mem" \
              "$kernel" --initrd "$cpio" $args 2>&1 | tr -d '\0' || true)
          echo "=== output ==="
          echo "$output" | head -40
          if echo "$output" | grep -qE "$expect"; then
            echo "PASS: matched /$expect/"
          else
            echo "FAIL: did not match /$expect/"
            exit 1
          fi
